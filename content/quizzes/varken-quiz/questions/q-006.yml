id: q-006
question: Hoe begroeten varkens elkaar?
image: mudbath.jpg
answers:
  - Ze klikken met hun hoeven
  - Ze wrijven met hun neuzen
  - Ze gillen naar elkaar
correct: 1
difficulty: easy
points: 1
type: image
explanation:
  text: |
    Varkens zijn sociale dieren. Ze tonen vaak affectie door elkaar te verzorgen en contact te maken met de snuit.
    In groepen letten ze op elkaars gedrag en positie, zodat duidelijk wordt wie dominant is.
