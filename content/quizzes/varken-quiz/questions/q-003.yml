id: q-003
question: Varkens kunnen hun naam onthouden. Binnen welke periode reageren ze vaak al op hun naam?
image: mudbath.jpg
answers:
  - Binnen de eerste week na de geboorte
  - Binnen tien dagen na de geboorte
  - Binnen de eerste maand na de geboorte
correct: 0
difficulty: medium
points: 1
type: image
explanation:
  text: |
    Varkens hebben een goed geheugen. Ze kunnen andere varkens herkennen en onthouden.
    Ook hebben ze vaak een sterk richtingsgevoel en kunnen ze hun weg vinden over grotere afstanden.
