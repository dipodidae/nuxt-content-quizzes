id: q-002
question: Varkens kunnen somber en teruggetrokken gedrag vertonen. Welke klacht wordt hierbij soms genoemd?
image: mudbath.jpg
answers:
  - Schizofrenie
  - Depressie
  - Autisme
correct: 1
difficulty: hard
points: 2
type: image
explanation:
  text: |
    Net als mensen hebben varkens emoties en een eigen karakter.
    Het ene dier is veerkrachtig, terwijl het andere gevoeliger kan zijn en somber gedrag kan ontwikkelen.
    In een omgeving met weinig ruimte, prikkels en keuzevrijheid kan dat risico toenemen.
